# ═══════════════════════════════════════════════════════════
#  AURUM CAPITAL — netlify.toml
#  Put this at the ROOT of your project (same level as index.html)
# ═══════════════════════════════════════════════════════════

[build]
  functions = "netlify/functions"   # folder where your functions live
  publish   = "."                   # root folder (or your dist folder)

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Redirect all unknown routes to index (SPA mode)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ── Environment Variables (set these in Netlify Dashboard UI) ──
# Go to: Site Settings → Environment Variables → Add variable
#
# 
#  CF_SPACE_ID     →  CF_SPACE_ID
#  CF_ENV          → master  
#  CF_CONTENT_TYPE → aurum
#  ALLOWED_ORIGIN  → https://auruminvest.netlify.app  (or *)
#  ADMIN_SECRET    → upinvest